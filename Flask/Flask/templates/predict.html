<!DOCTYPE html>
<html>

<head>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #FAF8F3;
        }

        .banner {
            background-color: #6b8e23;
            color: white;
            padding: 34px 32px;
            text-align: center;
        }

        .banner-text h3 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.3px;
            font-size: 26px;
        }

        .banner-text span {
            display: block;
            font-size: 13px;
            color: #eaf1d8;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .form-wrap {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .container {
            border-radius: 8px;
            background-color: #f2f2f2;
            padding: 24px;
            box-shadow: 0 2px 10px rgba(34, 48, 40, 0.06);
            animation: fadeIn 0.5s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fieldIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .field-group {
            opacity: 0;
            animation: fieldIn 0.4s ease forwards;
        }

        .field-group:nth-of-type(1)  { animation-delay: 0.05s; }
        .field-group:nth-of-type(2)  { animation-delay: 0.10s; }
        .field-group:nth-of-type(3)  { animation-delay: 0.15s; }
        .field-group:nth-of-type(4)  { animation-delay: 0.20s; }
        .field-group:nth-of-type(5)  { animation-delay: 0.25s; }
        .field-group:nth-of-type(6)  { animation-delay: 0.30s; }
        .field-group:nth-of-type(7)  { animation-delay: 0.35s; }
        .field-group:nth-of-type(8)  { animation-delay: 0.40s; }
        .field-group:nth-of-type(9)  { animation-delay: 0.45s; }
        .field-group:nth-of-type(10) { animation-delay: 0.50s; }
        .field-group:nth-of-type(11) { animation-delay: 0.55s; }

        label {
            display: block;
            font-size: 13.5px;
            font-weight: 600;
            color: #3a463d;
            margin-bottom: 4px;
            transition: color 0.2s ease;
        }

        input[type=number], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 2px;
            margin-bottom: 16px;
            resize: vertical;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
            background-color: #ffffff;
        }

        input[type=number]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6b8e23;
            box-shadow: 0 0 0 3px rgba(107, 142, 35, 0.18);
            transform: translateY(-1px);
        }

        .field-group:focus-within label {
            color: #6b8e23;
        }

        input[type=submit] {
            background-color: #223028;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            opacity: 0;
            animation: fieldIn 0.4s ease forwards 0.6s;
        }

        input[type=submit]:hover {
            background-color: #6b8e23;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 18px rgba(107, 142, 35, 0.3);
        }

        input[type=submit]:active {
            transform: translateY(0) scale(0.98);
        }
    </style>
</head>

<body>

    <div class="banner">
        <div class="banner-text">
            <h3>Smart Lender</h3>
            <span>Enter your details for loan approval prediction</span>
        </div>
    </div>

    <div class="form-wrap">
        <div class="container">

            <form action="{{ url_for('submit') }}" method="post">

                <div class="field-group">
                    <label for="Gender">Gender</label>
                    <select id="Gender" name="Gender">
                        <option value=0>Male</option>
                        <option value=1>Female</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="Married">Married</label>
                    <select id="Married" name="Married">
                        <option value=1>Yes</option>
                        <option value=0>No</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="Dependents">Dependents</label>
                    <input type="number" id="Dependents" name="Dependents" placeholder="No of Dependents on you....">
                </div>

                <div class="field-group">
                    <label for="Education">Education</label>
                    <select id="Education" name="Education">
                        <option value=0>Graduate</option>
                        <option value=1>Not Graduate</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="Self_Employed">Self Employed</label>
                    <select id="Self_Employed" name="Self_Employed">
                        <option value=1>Yes</option>
                        <option value=0>No</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="ApplicantIncome">Applicant Income</label>
                    <input type="number" id="ApplicantIncome" name="ApplicantIncome" placeholder="Your Income...">
                </div>

                <div class="field-group">
                    <label for="CoapplicantIncome">CO Applicant Income</label>
                    <input type="number" id="CoapplicantIncome" name="CoapplicantIncome" placeholder="Your Co Applicant Income...">
                </div>

                <div class="field-group">
                    <label for="LoanAmount">Loan Amount</label>
                    <input type="number" id="LoanAmount" name="LoanAmount" placeholder="Enter the Loan Amount...">
                </div>

                <div class="field-group">
                    <label for="Loan_Amount_Term">Loan Amount Term</label>
                    <input type="number" id="Loan_Amount_Term" name="Loan_Amount_Term" placeholder="Enter the Term Loan Amount in days...">
                </div>

                <div class="field-group">
                    <label for="Credit_History">Credit History</label>
                    <input type="number" id="Credit_History" name="Credit_History" placeholder="Enter the Your Previous Credit History...">
                </div>

                <div class="field-group">
                    <label for="Property_Area">Property Area</label>
                    <select id="Property_Area" name="Property_Area">
                        <option value=2>Urban</option>
                        <option value=1>Semiurban</option>
                        <option value=0>Rural</option>
                    </select>
                </div>

                <input type="submit" value="Submit">

            </form>

        </div>
    </div>

</body>

</html>
